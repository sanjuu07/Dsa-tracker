<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Tracker — Rahul Maheshwari's Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --done: #10b981;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --tag-bg: #1e1e2e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 1rem;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    white-space: nowrap;
  }
  .stat-pill b { color: var(--accent2); }

  .header-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #6d28d9; }

  /* Progress bar */
  .global-progress {
    padding: 1rem 2rem 0;
    max-width: 1200px;
    margin: 0 auto;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 0.5rem;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Search */
  .search-bar {
    max-width: 1200px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
    position: relative;
    z-index: 1;
  }

  .search-bar input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 2.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  /* Filter tabs */
  .filter-tabs {
    max-width: 1200px;
    margin: 1rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover, .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Main content */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Topic section */
  .topic-section {
    margin-bottom: 2rem;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: var(--card);
    transition: border-color 0.2s;
  }
  .topic-section:hover { border-color: rgba(124,58,237,0.3); }

  .topic-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .topic-header:hover { background: #13131d; }

  .topic-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.2);
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .topic-title {
    font-size: 1rem;
    font-weight: 800;
    flex: 1;
    letter-spacing: -0.01em;
  }

  .topic-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .topic-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .topic-count b { color: var(--done); }

  .topic-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .topic-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--done));
    border-radius: 99px;
    transition: width 0.3s;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .topic-section.collapsed .chevron { transform: rotate(-90deg); }

  .topic-body { display: flex; flex-direction: column; }
  .topic-section.collapsed .topic-body { display: none; }

  /* Sub-group (like Binary Search, Misc) */
  .subgroup-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent3);
    padding: 0.8rem 1.5rem 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border);
  }
  .subgroup-label:first-child { border-top: none; }

  /* Problem row */
  .problem-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1.5rem;
    border-top: 1px solid rgba(42,42,58,0.5);
    transition: background 0.1s;
    cursor: pointer;
  }
  .problem-row:first-of-type { border-top: none; }
  .problem-row:hover { background: rgba(124,58,237,0.04); }
  .problem-row.done { background: rgba(16,185,129,0.03); }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
  }
  .problem-row.done .check-box {
    background: var(--done);
    border-color: var(--done);
  }
  .check-box::after {
    content: '';
    display: none;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px,-1px);
  }
  .problem-row.done .check-box::after { display: block; }

  .problem-name {
    font-size: 0.85rem;
    flex: 1;
    line-height: 1.4;
    transition: color 0.1s;
  }
  .problem-row.done .problem-name {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(107,107,128,0.4);
  }

  .problem-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--accent2);
    text-decoration: none;
    background: rgba(6,182,212,0.05);
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .problem-link:hover { background: rgba(6,182,212,0.15); border-color: var(--accent2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.done { border-color: var(--done); color: var(--done); }
  .toast.undone { border-color: var(--muted); color: var(--muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  @media (max-width: 600px) {
    .header-stats { display: none; }
    .topic-bar { display: none; }
    .problem-link { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">DSA<span>Track</span></div>
    <div class="header-stats">
      <div class="stat-pill">Total: <b id="stat-total">0</b></div>
      <div class="stat-pill">Done: <b id="stat-done">0</b></div>
      <div class="stat-pill">Progress: <b id="stat-pct">0%</b></div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="resetAll()">Reset All</button>
      <button class="btn primary" onclick="markAllDone()">Mark All Done</button>
    </div>
  </div>
</header>

<div class="global-progress" style="position:relative;z-index:1;">
  <div style="display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:4px;">
    <span>Overall Progress</span>
    <span id="prog-label">0 / 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="global-bar" style="width:0%"></div>
  </div>
</div>

<div class="search-bar">
  <span class="search-icon">⌕</span>
  <input type="text" id="search-input" placeholder="Search problems..." oninput="filterProblems()">
</div>

<div class="filter-tabs" id="filter-tabs">
  <button class="tab active" onclick="filterTopic('all', this)">All Topics</button>
</div>

<main id="main-content"></main>

<div class="toast" id="toast"></div>

          { name: "Snake and Ladder Problem", url: "https://practice.geeksforgeeks.org/problems/snake-and-ladder-problem4816/1" },
          { name: "Minimum Cost Path", url: "https://practice.geeksforgeeks.org/problems/minimum-cost-path3833/1" },
          { name: "Activity Selection", url: "https://practice.geeksforgeeks.org/problems/activity-selection-1587115620/1" },
          { name: "N meetings in one room", url: "https://practice.geeksforgeeks.org/problems/n-meetings-in-one-room-1587115620/1" },
          { name: "Shop in Candy Store", url: "https://practice.geeksforgeeks.org/problems/shop-in-candy-store1145/1" },
          { name: "Minimum Operations", url: "https://practice.geeksforgeeks.org/problems/find-optimum-operation/1" },
          { name: "Optimal Strategy For A Game", url: "https://practice.geeksforgeeks.org/problems/optimal-strategy-for-a-game-1587115620/1" },
          { name: "Word Boggle", url: "https://practice.geeksforgeeks.org/problems/word-boggle4143/1" },
          { name: "Number is sparse or not", url: "https://practice.geeksforgeeks.org/problems/number-is-sparse-or-not/1" },
          { name: "Bit Difference", url: "https://practice.geeksforgeeks.org/problems/bit-difference/1" },
          { name: "Party of Couples", url: "https://practice.geeksforgeeks.org/problems/alone-in-couple5507/1" },
          { name: "Rightmost different bit", url: "https://practice.geeksforgeeks.org/problems/rightmost-different-bit2633/1" },
          { name: "Consecutive 1's not allowed", url: "https://practice.geeksforgeeks.org/problems/consecutive-1s-not-allowed1706/1" },
          { name: "Jumping Caterpillars", url: "https://practice.geeksforgeeks.org/problems/jumping-caterpillars/1" },
          { name: "Save Ironman", url: "https://practice.geeksforgeeks.org/problems/save-ironman/1" },
          { name: "String Ignorance", url: "https://practice.geeksforgeeks.org/problems/string-ignorance/1" },
          { name: "Mirror Tree", url: "https://practice.geeksforgeeks.org/problems/mirror-tree/1" },

          { name: "Lowest Common Ancestor in a Binary Tree", url: "https://practice.geeksforgeeks.org/problems/lowest-common-ancestor-in-a-binary-tree/1" },
          { name: "Longest consecutive sequence in Binary tree", url: "https://practice.geeksforgeeks.org/problems/longest-consecutive-sequence-in-binary-tree/1" },
          { name: "2-sum and 3-sum", url: "https://www.geeksforgeeks.org/two-sum-problem/" },
          { name: "Tree of Space", url: "https://www.geeksforgeeks.org/trees-in-data-structure/" },

// State
let done = {};
let searchTerm = '';
let topicFilter = 'all';

function loadState() {
  try { done = JSON.parse(localStorage.getItem('dsa_done') || '{}'); } catch(e) { done = {}; }
}
function saveState() {
  localStorage.setItem('dsa_done', JSON.stringify(done));
}

function getProblemId(topicId, groupIdx, probIdx) {
  return `${topicId}_${groupIdx}_${probIdx}`;
}

function toggleDone(id, e) {
  e && e.stopPropagation();
  done[id] = !done[id];
  saveState();
  render();
  showToast(done[id]);
}

function showToast(isDone) {
  const t = document.getElementById('toast');
  t.textContent = isDone ? '✓ Marked as done!' : '○ Marked as pending';
  t.className = 'toast ' + (isDone ? 'done' : 'undone');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.className = 'toast', 1800);
}

function getAllIds() {
  const ids = [];
  TOPICS.forEach(topic => {
    topic.groups.forEach((grp, gi) => {
      grp.problems.forEach((_, pi) => ids.push(getProblemId(topic.id, gi, pi)));
    });
  });
  return ids;
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  done = {};
  saveState();
  render();
}

function markAllDone() {
  getAllIds().forEach(id => done[id] = true);
  saveState();
  render();
}

function filterProblems() {
  searchTerm = document.getElementById('search-input').value.toLowerCase();
  render();
}

function filterTopic(id, el) {
  topicFilter = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleSection(id) {
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.toggle('collapsed');
}

function countTopic(topic) {
  let total = 0, doneCount = 0;
  topic.groups.forEach((grp, gi) => {
    grp.problems.forEach((_, pi) => {
      total++;
      if (done[getProblemId(topic.id, gi, pi)]) doneCount++;
    });
  });
  return { total, doneCount };
}

function render() {
  const allIds = getAllIds();
  const totalDone = allIds.filter(id => done[id]).length;
  const total = allIds.length;
  const pct = total ? Math.round(totalDone / total * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = totalDone;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${totalDone} / ${total}`;

  const main = document.getElementById('main-content');
  let html = '';
  let anyVisible = false;

  TOPICS.forEach(topic => {
    if (topicFilter !== 'all' && topicFilter !== topic.id) return;

    const { total: tTotal, doneCount: tDone } = countTopic(topic);
    const tPct = tTotal ? Math.round(tDone / tTotal * 100) : 0;

    // Filter problems
    let hasMatch = false;
    const groupsHtml = topic.groups.map((grp, gi) => {
      const probsHtml = grp.problems.map((prob, pi) => {
        if (searchTerm && !prob.name.toLowerCase().includes(searchTerm)) return '';
        hasMatch = true;
        const id = getProblemId(topic.id, gi, pi);
        const isDone = !!done[id];
        return `<div class="problem-row${isDone ? ' done' : ''}" onclick="toggleDone('${id}', event)">
          <div class="check-box" onclick="toggleDone('${id}', event)"></div>
          <span class="problem-name">${prob.name}</span>
          <a class="problem-link" href="${prob.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Solve →</a>
        </div>`;
      }).join('');

      if (!probsHtml) return '';
      return `<div class="subgroup-label">${grp.label}</div>${probsHtml}`;
    }).join('');

    if (searchTerm && !hasMatch) return;
    anyVisible = true;

    html += `<div class="topic-section" id="sec-${topic.id}">
      <div class="topic-header" onclick="toggleSection('${topic.id}')">
        <span class="topic-num">${topic.num}</span>
        <span class="topic-title">${topic.title}</span>
        <div class="topic-meta">
          <span class="topic-count"><b>${tDone}</b> / ${tTotal}</span>
          <div class="topic-bar"><div class="topic-bar-fill" style="width:${tPct}%"></div></div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="topic-body">${groupsHtml}</div>
    </div>`;
  });

  if (!anyVisible) {
    html = `<div class="empty-state">No problems found for "${searchTerm}"</div>`;
  }

  main.innerHTML = html;
}

function buildTabs() {
  const tabs = document.getElementById('filter-tabs');
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = t.title;
    btn.onclick = function() { filterTopic(t.id, this); };
    tabs.appendChild(btn);
  });
}

// Init
loadState();
buildTabs();
render();
</script>
